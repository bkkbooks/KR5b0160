front:
  text: 洪恩靈濟眞君事實壹十
  hash: sha256:2cf195639ff7317df3a20839aaac89c543ed150d094c8d95f93e4027d667cb59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0160_HFL_000-001a, image: hfl/0265/0265-036.png}
body:
  text: 御製霊齋宮碑朕惟自古英賢生爲名臣著芘民之功没爲明神賛天地之化鼓動流盪行乎兩間以蔭福斯民禦灾捍患欨枯吹生濯濯洋洋如在其上如在其左右者非智慮所可得而測也詩曰神之格思不可度思矧可射思其此之謂歟惟九天金闕明道逹德大仙顯靈溥濟眞人江王九天玉闕宣化扶教上仙昭靈博濟眞人饒王其功徳充溢蓋若是巳神南唐之胄生有民社之勲沒錄仙班之籍伯仲齊美華萼聮芳領職上天燿靈下土呼吸感應電邁風行下民是冒父母其依慈祥仁愛物頼以寧乃者朕躬弗豫用藥百計罔底于效神黙運精靈翊衛朕躬頃刻弗違隨叩隨應屢顯明徵施以靈符天醫妙藥使殆而復安仆而復起有回生之功恩恵博矣盛矣朕揆徳涼薄何由獲茲永懷神徳曷其能忘海深嶽峻其焉有極蓋有功必報國之恒典是用祝册加封神號伯曰清微洞玄沖虚妙感慈恵護國庇民洪恩眞君仲曰髙明弘静沖湛妙應仁恵輔國祐民洪恩眞君舊號俱如故大新廟宇亢爽軒豁稱神所棲爰勑有司䖍潔香火春秋祭祀歳易時衣給灑掃五户表朕悃愊答神鴻休雖然神功之厚而報賫之薄神固無責於報否在朕心有不能巳矣夫天地之德曰生神體天地之道弼亮化機出幽入明翕張歘怱遨怱遨清監觀四方濟利群生功在霄壞昭昭若此固有不可得而名言者乃彰神續勒于貞石樹之于廟垂示無窮并系以詩曰天産英靈爲世傑出入幽明猶一覕生著勲勞保既粤没爲明神崇偉烈芒芒海甸倚芘樾雨暘寒燠調以制冬無凌兢夏無暍沴氣逺殄靡颶颲下稌髙黍歳穰桀驅拂不祥走祅螌晨鍾暮鼓樂髫耋卓彼鰲峯峻且嶻蜿蜒回抱天造設春蘭薦芳秋鞠馝寒泉白石漱清潔神之遊兮羽葆翳飛雲翩翩導幢節歘来忽往靈僁僁呼吸響應速以偈濟利溥博無時愒四時報享繁獻醊衛朕之功疇與埒惟矢銘心與刻骨書恩著徳勒堅碣垂示萬古昭日月永樂十五年五月初一日二眞成仙徐知證系出偃王之後五代時南唐人與其弟知諤並英邁絶倫寛仁愛物忠君孝親崇信三寳同心好善精勤至道修齎設醮日常持誦玉皇眞經并寳號兄弟俱事吳其後知證封江王知諤封饒王鎭金陵戰守有備撫輯流亡控扼二十餘州氓征就寛軍給以饒林蠻洞蜑守條死要稚耋嬉遊連手歌謳上無所怨下無所讎江南之民舉頼以安後奉命帥師攻閩恐良善荼毒乃發至願每五更望北拜斗早膳恒素食祈殄兵革所至勞來百姓諸郡望風以城降父老簞食壺漿擁道迎之次峡江有潰卒數百阻山爲亂立命殱其渠魁餘卒棄甲呼舞不戰而收民皆安堵雖田園蔬稻一無所犯乃相謀曰此吾復生之父母也立祠於鼇峯以祀之未幾兄弟相繼仙去遂爲斗中都水使者出入天宫積行累功黙佑下民俾人皆盡忠行孝崇信三寳遇歳旱民禱祠下祠前潭水深不可測俄有靈蛇出蜿蜒于几案間色如丹砂雲起潭面竟日不收詰旦果雨歳大熟一日潢溪霖潦暴溢田稼墊溺衆方狼顧失色忽見有役夫千群競操畚鍤䟽其源決其流水竟不爲民害巳而俱失所在乃神兵也滄峽灘石峻嶮舟船上下失勢水工呌呼祈佑感雲中有黄旗隱隱即帖然無虞凡民居有不戒于火者有蝗𧏹傷其稼者叩之則反風減火蝗輙飛去又爲符藥以施人凡嬰疾弗愈者服之無不立效祈子息者服之即得嗣續蕃昌由是民安物阜田里晏然閩人劉彜守桂州交阯蠻賊寇邊陷欽連等州彜震懼莫知所爲齋戒黙禱賊果潰去其後韓世忠戰大儀鎭吴玠戰和尚原俱遣將士衛國效八公山草木之靈使敵遙見旗纛旌麾飛揚山谷鐵騎百萬行陣嚴肅鉦鼓之聲震動原野不待交兵而巳敗北靈蹟顯異不可備述一日黃籙齋進忽聞天樂鳴空祥雲環遶仙宫導從甚都乃感天帝遣神人頒誥封江王爲九天金闕明道逹德大仙顯靈溥濟眞人主管上清天文院便宜行事行文昌司祿上宰僉書天機省事妻涇國夫人許氏順助仁恵仙姑兼管太乙延生右眞司事饒王爲九天五闕宣化扶教上仙昭靈博濟眞人主管下元地府諸司便宜行事權南極注生上相僉書雷霆玄省事妻衛國夫人陶氏善助慈懿仙姑兼管元皇北隂注生司事仍封父忠武眞人毋仁壽仙妃比者朕躬遘疾黙運化機大闡靈貺翊衛左右頃刻不離施以靈符濟以天醫妙藥隨言隨效感應如響使困敞之體既危而即安沈痼之疾盡脱而復舊幹旋之力同於更生感神之恵銘刻不忘是用祝册加封伯曰清微洞玄沖虛妙感慈惠護國庇民洪恩眞君涇國夫人加封貞應仙妃仲曰髙明弘靜沖湛妙應仁惠輔國佑民洪恩眞君衛國夫人加封恭静仙妃神父曰翊亮眞君神母日淑善仙妃舊號俱如故大新閩地祠宇又於京都建立行祠以安神棲特勅所司嚴奉祀焉夫爲人臣而功施社稷澤被生民者必生爲英傑死爲明神雖百世之下福佑生靈隂翊皇化觀知證知諤以世胄之裔事主季世乃能靖難一方保全其民既攻閩中按甲入境首除亂兵脱民鋒鏑之𢡖措之衽席之安是以人心感激靡克報稱乃立生祠以杞之逮其仙去禦大灾捍大患使民無凶荒疵癘之憂遂休養生息之樂功成行滿上感天心錫號眞人叙列仙品比者斡運化機大闡靈貺愈疾朕躬是用加以徽號新其祠宇䖍奉享祀以答神休斯皆累積隂功之所致故昭昭不朽與天地相爲悠乆夫豈偶然而巳哉詩曰事親盡孝事君忠華萼聮芳孰與同更復精勤修至道並分茅土受王封又當年駐節向金陵萬里江南不識兵師入七閩人按堵幾多福澤在生靈又歳旱靈潭起蟄龍大施霖雨作年豐潢溪水落民無患滄峽舟船險更通又蝗無傷稼火無過田野均䝉恵澤多徧給靈符蕃子息更能愈疾起沈痾又桂郡揚靈却冦蠻現竒更效八公山神兵百萬填山谷頓解重圍頃刻間又靈符妙藥出天醫翊衛微躬不蹔離起疾神功難報稱再生感惠此心知又隨聲應感不移時幹運功叅造化機馭氣乘風遊八極天宫陟降闡靈威又生為名將違髙勲行滿成仙福有因京國鼇峯長廟食丹書錫號證天眞又威靈濯濯更洋洋衛國安民續愈彰不獨聲名昭日月永同地乆與天長保奏眞君文金關侍中行九靈飛歩章奏節制雷霆臣王謹奏臣切謂道在無極之始㝠㝠杳杳不識不知非心思計慮之所能也自天眞皇人紫筆定書然後學道者得以探其源洩其流撰成科典靈文耳目斯世今有神焉以修齋執戒爲功以度死濟生爲誓發爲文辭合於科典凡曰長材秀民者莫不交口誦之其可稽於徹聞乎切見九天金闕眞人徐知證九天玉闕眞人徐知諤聲名冠世功徳在民内察其行外觀其跡委是骨像合仙有心積善建功篤好三寳之士若非宿幸因縁窮神而知化者孰能如此所著九眞妙戒化文九嶽神燈科格三界科保馬科並出於太上玄言究微摘實自然成章靈音嘯咏可以爲浩劫津梁所謂閉門造車者不計其歳月矣外有靈濟醮科本願儀文七政燈科自非敢以爲巳功從民請也臣性識踈愚爲言輕賤考事察能詮補職任躋進仙階今欲望聖慈允俞所奏再將臣徐知證等所撰科典翻行三界合屬去處各請遵禀照驗施行不惟顯靈濟濟度之功亦足以張吾軍而慰民心之所望也伏候指揮洪恩靈濟眞君事實
